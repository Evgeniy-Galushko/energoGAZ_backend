tags:
  - Operational Work
summary: List of employees
operationId: allEmployees
description: List of employees
security:
  - bearerAuth: []
responses:
  '200':
    description: 'All employeess'
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: 'All employeess'
            data:
              type: array
              items:
                type: object
                required:
                  - _id
                  - name
                  - jobTitle
                  - placeOfWork
                properties:
                  _id:
                    description: 'employeess id'
                    type: string
                    example: '6a22c356b0a3c31e140331a0'
                  name:
                    description: 'employeess name'
                    type: string
                    example: 'Колобков'
                  jobTitle:
                    description: 'job title'
                    type: string
                    example: 'менеджер'
                  placeOfWork:
                    description: 'place of work'
                    type: string
                    example: 'офис'
  '401':
    $ref: ../../components/responses/401.yaml
  '403':
    $ref: ../../components/responses/403.yaml
