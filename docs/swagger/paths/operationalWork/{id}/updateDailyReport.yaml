tags:
  - Operational Work
summary: Daily report update
operationId: updateDailyReportAgzp
description: Daily report update
security:
  - bearerAuth: []
parameters:
  - in: path
    name: dailyReportId
    required: true
    schema:
      type: string
      example: 6a3fdc5619aaaac34baa0513
requestBody:
  content:
    application/json:
      schema:
        type: object
        # required:
        #   - numberAgzp
        #   - date
        #   - operatorName
        #   - typeOfFuel
        #   - fuelArrival
        #   - noteForFuelArrival
        #   - initialCounterValue1
        #   - finalMeterReading1
        #   - initialCounterValue2
        #   - finalMeterReading2
        #   - fuelResidues
        #   - noteOnFuelRemaining
        #   - price
        #   - cashRegisterTotal
        #   - byTerminal
        #   - litersByCashRegister
        #   - f2Total
        #   - litersByF2
        #   - accordingToContract
        #   - fuelForTheOffice
        #   - noteForFuelForTheOffice
        properties:
          numberAgzp:
            description: 'gas station number'
            type: string
            example: 'agzp_1'
          date:
            description: 'What period is the report for'
            type: string
            example: '2026-02-25'
          operatorName:
            description: 'Operators name'
            type: string
            example: 'Иванов И.И.'
          typeOfFuel:
            description: 'type of fuel'
            type: string
            enum: ['gas', 'gasoline_A_95', 'gasoline_A_92', 'diesel']
          fuelArrival:
            description: 'arrival of fuel at the gas station'
            type: array
            items:
              type: object
              properties:
                containerNumber:
                  type: number
                  description: Tank number
                volume:
                  type: number
                  description: Drained fuel
              required:
                - containerNumber
                - volume
            example:
              - containerNumber: 1
                volume: 0
              - containerNumber: 2
                volume: 10000
          noteForFuelArrival:
            description: 'Note for fuel arrival'
            type: string
            example: 'в 1 емкость слито 5000 л., во 2 емкость слито 4000 л.'
          initialCounterValue1:
            description: 'Initial counter value 1'
            type: number
            example: 2567874.23
          finalMeterReading1:
            description: 'Final meter reading 1'
            type: number
            example: 2569874.23
          initialCounterValue2:
            description: 'Initial counter value 2'
            type: number
            example: 0
          finalMeterReading2:
            description: 'Final meter reading 2'
            type: number
            example: 0
          fuelResidues:
            description: 'Remaining fuel at the gas station'
            type: array
            items:
              type: object
              properties:
                containerNumber:
                  type: number
                  description: Tank number
                remainder:
                  type: number
                  description: Remaining fuel
              required:
                - containerNumber
                - remainder
            example:
              - containerNumber: 1
                remainder: 85
              - containerNumber: 2
                remainder: 65
          noteOnFuelRemaining:
            description: 'Note on fuel remaining'
            type: string
            example: ''
          price:
            description: 'Price of fuel at the gas stationl'
            type: number
            example: 28.50
          cashRegisterTotal:
            description: 'Cash register amount per shift'
            type: number
            example: 3654.5
          byTerminal:
            description: 'Amount per terminal per shift'
            type: number
            example: 2521.25
          litersByCashRegister:
            description: 'Liters by cash register and terminal'
            type: number
            example: 256.50
          f2Total:
            description: 'Sum over f2'
            type: number
            example: 12035.25
          litersByF2:
            description: 'Liters by f2'
            type: number
            example: 505.50
          accordingToContract:
            description: 'Refueling under contract'
            type: array
            items:
              type: object
              properties:
                nameCompani:
                  type: string
                  description: Company name
                liters:
                  type: number
                  description: Liters filled
            example:
              - nameCompani: 'МХП'
                liters: 250
              - nameCompani: 'Коло'
                liters: 50
          fuelForTheOffice:
            description: 'Fuel for office needs'
            type: number
            example: 50
          noteForFuelForTheOffice:
            description: 'Office fuel note'
            type: string
            example: '30 - управляющий АГЗП, 20 - главный инженер'
responses:
  '200':
    $ref: ../../../components/responses/200updateDailyReport.yaml
  '401':
    $ref: ../../../components/responses/401.yaml
  '403':
    $ref: ../../../components/responses/403.yaml
  '404':
    description: NotFoundError
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: NotFoundError
            data:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  example: 'No such report found.'
