tags:
  - User
summary: User Login
operationId: addUser
description: User Login
security: []
requestBody:
  content:
    application-json:
      schema:
        type: object
        required:
          - name
          - password
          - placeOfWork
        properties:
          name:
            description: 'user name'
            type: string
            example: 'John'
          password:
            description: 'user password'
            type: string
            example: '123456789'
          placeOfWork:
            description: 'user place of work'
            type: string
            example: 'agzp_1'
responses:
  '200':
    description: 'The user is authorized'
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message::
              type: string
              example: 'Successfully logged in an user!'
            data:
              type: object
              required:
                - userId
                - name
                - jobTitle
                - placeOfWork
                - accessToken
              properties:
                userId:
                  description: 'user Id'
                  type: string
                  example: '6a22c356b0a3c31e140331a0'
                name:
                  description: 'user name'
                  type: string
                  example: 'John'
                jobTitle:
                  description: 'job title user'
                  type: string
                  example: 'оператор'
                placeOfWork:
                  description: 'place of work user'
                  type: string
                  example: agzp_1
                accessToken:
                  description: 'token'
                  type: string
                  example: '+QrbOSsmN5Mu7RGtMS5nJAuuWNhI0SJyccHIdvT0'
  '404':
    description: 'NotFoundError'
    content:
      aplication/json:
        schema:
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 404
            message:
              type: string
              example: 'User not found'
            data:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  example: 'User not found'
